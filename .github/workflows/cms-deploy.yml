name: CMS Deploy

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force deploy
        type: boolean
        default: false
      payload:
        description: Pages CMS payload as JSON
        required: true
        type: string        

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist/ --project-name=carmen-ng
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
