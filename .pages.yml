# PagesCMS configuration for carmen-ng-healing.
# Docs: https://pagescms.org/docs/
#
# This file is read by app.pagescms.org against the connected GitHub repo.
# It declares what content editors can edit, where files live, and where
# uploaded media is stored.
#
# Status: config-only. The Astro site still reads from src/data/posts.ts
# and src/pages/testimonials.astro. Migrating those to content collections
# is the next step, but is gated on you confirming this config loads
# correctly in the PagesCMS UI.

media:
  - name: images
    label: Blog cover images
    input: public/uploads
    output: /uploads
    categories: [image]
    extensions: [jpg, jpeg, png, webp]


  # ---------------------------------------------------------------------------
  # Blog posts
  # ---------------------------------------------------------------------------
  # One Markdown file per post, in src/content/blog/{slug}.md.
  # Frontmatter holds metadata + 3 body fields (one per locale).
  # The Markdown body is left empty; PagesCMS edits the body fields directly.
  # ---------------------------------------------------------------------------

content:
  - name: blog
    label: Blog Posts
    path: src/content/blog
    filename: '{slug}.md'
    format: yaml-frontmatter
    type: collection
    view:
      fields: [title_en, published, date]
      primary: title_en
      sort: [date, title_en]
      default:
        sort: date
        order: desc
    fields:
      - name: slug
        type: string
        label: URL slug
        description: >-
          Lowercase, hyphen-separated. Used as the filename and the post URL
          (e.g. "ghibli-paper-fortune" → /en/blog/ghibli-paper-fortune).
        options:
          maxlength: 80
        # Slug is also the filename; do not let editors rename freely.
        # (The PagesCMS filename template uses {slug} so they must match.)
      - name: title_en
        type: string
        label: Title (English)
      - name: title_jp
        type: string
        label: Title (Japanese)
      - name: title_zh
        type: string
        label: Title (Traditional Chinese)        
      - name: date
        type: date
        label: Publish date
      - name: category
        type: select
        # label: Category
        options:
          values: 
          - name: article
            label: Article
          - name: news
            label: News & Events
      - name: cover
        type: image
        label: Cover image
        description: Square 1000×1000 image. Stored in public/uploads/.
        options:
          media: images
          path: public/uploads
          extensions: [jpg, jpeg, png, webp]
      - name: video
        type: string
        label: Cover video path
        description: >-
          Public path under /videos/ (e.g. /videos/kwanon-canon.mp4). Leave
          blank if the post uses a still cover image. Only Kwanon & Canon
          currently uses a video.
      - name: body_en
        type: rich-text
        label: Body (English)
        description: >-
          Markdown body. Leave blank if the English translation is not
          ready; the site will fall back to the Japanese body and show a
          "translation pending" notice.
        options:
          format: markdown
          switcher: true
      - name: body_jp
        type: rich-text
        label: Body (Japanese)
        description: >-
          Markdown body. Required. JP is the canonical version — EN and
          ZH fall back to this when empty.
        options:
          format: markdown
          switcher: true
      - name: body_zh
        type: rich-text
        label: Body (Traditional Chinese)
        description: >-
          Markdown body. Leave blank to fall back to the Japanese body
          with a "中文翻譯準備中" notice.
        options:
          format: markdown
          switcher: true

  # ---------------------------------------------------------------------------
  # Testimonials
  # ---------------------------------------------------------------------------
  # One Markdown file per testimonial, in src/content/testimonials/{name}.md.
  # Filename is the testimonial author's first name (used as a unique id).
  # ---------------------------------------------------------------------------
  
  - name: testimonials
    label: Testimonials
    type: collection
    path: src/content/testimonials
    filename: '{title}.md'
    format: yaml-frontmatter
    view:
      fields: [ title, service, rating, date]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc    
    fields:     
      - name: title
        type: string
        label: Author first name
        options:
          maxlength: 40  
      - name: service
        type: string
        label: Session / Workshop
        description: >-
          Which session or workshop the testimonial is for (e.g. "Spiritual
          Guidance & Healing", "Body Scan Workshop", "Home Cleansing R.A.A.H.").
      - name: date
        type: date
        label: Publish date    
      - name: lang
        type: select
        label: Original language
        options:
          values:
          - name: jp
            label: 日本語 (Japanese)
          - name: en
            label: English
          - name: zh
            label: 中文 (Traditional Chinese)
      - name: rating
        type: number
        label: Star rating
        options:
          min: 1
          max: 5
      - name: body
        type: rich-text
        label: Testimonial text
        description: >-
          In the original language as Carmen received it. Line breaks are
          preserved. The field is named `body` so PagesCMS writes to
          the Markdown body (not frontmatter), which is what the
          testimonials page renders.

  # ---------------------------------------------------------------------------
  # Services
  # ---------------------------------------------------------------------------
  # One Markdown file per service, in src/content/services/{slug}.md.
  # Each service has title/description in EN + JP + ZH (the EN homepage
  # shows title_en/desc_en; the JP/ZH homepages show title_jp/desc_jp or
  # title_zh/desc_zh). Display order is controlled by the 'order' field
  # (lower numbers appear first).
  # ---------------------------------------------------------------------------
  - name: services
    label: Services
    type: collection
    path: src/content/services
    filename: '{slug}.md'
    format: yaml-frontmatter
    view:
      fields: [title_en, title_zh, title_jp ]
      primary: title_en
      sort: [ title_en]      
    fields:
      - name: title_en
        type: string
        label: Title (English)
      - name: title_jp
        type: string
        label: Title (Japanese)
      - name: title_zh
        type: string
        label: Title (Traditional Chinese)
      - name: subtitle_en
        type: string
        label: Subtitle (English)
      - name: subtitle_jp
        type: string
        label: Subtitle (Japanese)
      - name: subtitle_zh
        type: string
        label: Subtitle (Traditional Chinese)
      - name: desc_en
        type: text
        label: Description (English)
      - name: desc_jp
        type: text
        label: Description (Japanese)
      - name: desc_zh
        type: text
        label: Description (Traditional Chinese)
      - name: icon
        type: string
        label: Icon
        description: >-
          A single emoji or symbol character shown in the card (e.g. ✦, ♯,
          ☆, ◈). Rendered as text, so it must be a real Unicode character.

      - name: color
        type: select
        label: Accent color
        description: >-
          Picks the soft accent color for the card. Limited to the site's
          existing palette to keep colors consistent.
        options:
          values:
          - name: rose
            label: Rose
          - name: lavender
            label: Lavender
          - name: sky
            label: Sky
          - name: peach
            label: Peach

      - name: order
        type: number
        label: Display order
        description: >-
          Lower numbers appear first. Leave at 100 to push to the end.
        options:
          min: 1
          max: 999
          default: 100

      # --- Detail page content (used by /[locale]/services/[slug] pages) ---
      # Tagline shown on the service detail page directly below the H1.
      - name: tagline_en
        type: text
        label: Tagline (English)
        description: >-
          Short line shown below the service title on the detail page.
      - name: tagline_jp
        type: text
        label: Tagline (Japanese)
      - name: tagline_zh
        type: text
        label: Tagline (Traditional Chinese)

      # Overview / intro paragraph at the top of the detail page.
      - name: intro_en
        type: text
        label: Overview (English)
      - name: intro_jp
        type: text
        label: Overview (Japanese)
      - name: intro_zh
        type: text
        label: Overview (Traditional Chinese)

      # "What we do in the session" body block.
      - name: what_we_do_en
        type: text
        label: 'What we do (English)'
      - name: what_we_do_jp
        type: text
        label: 'What we do (Japanese)'
      - name: what_we_do_zh
        type: text
        label: 'What we do (Traditional Chinese)'

      # "Through the session" body block.
      - name: through_session_en
        type: text
        label: 'Through the session (English)'
      - name: through_session_jp
        type: text
        label: 'Through the session (Japanese)'
      - name: through_session_zh
        type: text
        label: 'Through the session (Traditional Chinese)'

      # "Recommended for" bullet list.
      - name: recommended_en
        type: list
        label: 'Recommended for (English)'
        description: >-
          One bullet per line. Leave empty to hide this section.
        options:
          item:
            type: string
      - name: recommended_jp
        type: list
        label: 'Recommended for (Japanese)'
        options:
          item:
            type: string
      - name: recommended_zh
        type: list
        label: 'Recommended for (Traditional Chinese)'
        options:
          item:
            type: string

      # Sub-offerings: each becomes its own card on the detail page with
      # its own price + duration. Leave empty to keep this entry as a
      # homepage card only (no detail page).
      - name: offerings
        type: list
        label: Session offerings & pricing
        description: >-
          Each entry becomes a card on the service detail page. Add the
          first one for the initial session, then follow-ups, packages, etc.
        options:
          item:
            type: object
            fields:
              - name: title_en
                type: string
                label: Title (English)
              - name: title_jp
                type: string
                label: Title (Japanese)
              - name: title_zh
                type: string
                label: Title (Traditional Chinese)
              - name: desc_en
                type: text
                label: Description (English)
              - name: desc_jp
                type: text
                label: Description (Japanese)
              - name: desc_zh
                type: text
                label: Description (Traditional Chinese)
              - name: bullets_en
                type: list
                label: Bullet list (English)
                options:
                  item:
                    type: string
              - name: bullets_jp
                type: list
                label: Bullet list (Japanese)
                options:
                  item:
                    type: string
              - name: bullets_zh
                type: list
                label: Bullet list (Traditional Chinese)
                options:
                  item:
                    type: string
              - name: duration_en
                type: string
                label: Duration (English, e.g. "120 min")
              - name: duration_jp
                type: string
                label: Duration (Japanese, e.g. "120分")
              - name: duration_zh
                type: string
                label: Duration (Traditional Chinese, e.g. "120分鐘")
              - name: price_en
                type: number
                label: Price (USD, English)
                description: >-
                  Integer. Set to 0 to show "Contact for pricing".
                options:
                  min: 0
              - name: price_jp
                type: number
                label: Price (JPY, Japanese)
                description: >-
                  Integer. Set to 0 to show "Contact for pricing".
                options:
                  min: 0
              - name: price_zh
                type: number
                label: Price (HKD, Traditional Chinese)
                description: >-
                  Integer. Set to 0 to show "Contact for pricing".
                options:
                  min: 0
              - name: currency_en
                type: string
                label: Currency prefix (English)
                description: >-
                  Text prefix shown before the EN price. Default "US$".
              - name: currency_jp
                type: string
                label: Currency prefix (Japanese)
                description: >-
                  Text prefix shown before the JP price. Default "¥".
              - name: currency_zh
                type: string
                label: Currency prefix (Traditional Chinese)
                description: >-
                  Text prefix shown before the ZH price. Default "HK$".
      - name: slug
        type: string
        label: URL slug
        description: >-
          Lowercase, hyphen-separated. Used as the filename and the
          service detail URL (e.g. "spiritual-guidance" →
          /en/services/spiritual-guidance).

  # ---------------------------------------------------------------------------
  # About Me
  # ---------------------------------------------------------------------------
  # Single-entry collection. There is only one About page; it's always
  # fetched with `getEntry('about', 'main')`. Body content is per-locale
  # (JP body is always required; EN and ZH optional, fall back to JP
  # on the page). The "main" filename is fixed — do not rename.
  # ---------------------------------------------------------------------------
  - name: about
    label: About Me
    type: collection
    path: src/content/about
    filename: 'main.md'
    format: yaml-frontmatter
    view:
      fields: [title_en, title_jp, title_zh]
      primary: title_en
    fields:
      - name: title_en
        type: string
        label: Page title (English)
      - name: title_jp
        type: string
        label: Page title (Japanese)
      - name: title_zh
        type: string
        label: Page title (Traditional Chinese)
      - name: body_en
        type: text
        label: Body (English)
        description: >-
          Long-form bio, paragraph breaks preserved. Falls back to
          the Japanese body on /en/about if empty.
      - name: body_jp
        type: text
        label: Body (Japanese)
      - name: body_zh
        type: text
        label: Body (Traditional Chinese)
      - name: signoff_en
        type: text
        label: Sign-off (English)
        description: >-
          Closing line, e.g. "Love Light,\nCarmen". Line breaks
          preserved.
      - name: signoff_jp
        type: text
        label: Sign-off (Japanese)
      - name: signoff_zh
        type: text
        label: Sign-off (Traditional Chinese)
      - name: portrait
        type: string
        label: Portrait image path
        description: >-
          Public path under /uploads/ (e.g. /uploads/about-portrait.jpg).
          Shown in the left column of the about page hero.
      - name: hands
        type: string
        label: Hands / second image path
        description: >-
          Public path under /uploads/. Shown in the right column of
          the about page hero.
      - name: languages_en
        type: text
        label: 'Languages note (English)'
        description: >-
          Optional footnote, e.g. "I work in English, Cantonese,
          and Japanese." Leave empty to hide.
      - name: languages_jp
        type: text
        label: 'Languages note (Japanese)'
      - name: languages_zh
        type: text
        label: 'Languages note (Traditional Chinese)'
      - name: certifications
        type: list
        label: Training & Certifications
        description: >-
          One entry per school. Each school has a per-locale name +
          a list of completed programs.
        options:
          item:
            type: object
            fields:
              - name: school_en
                type: string
                label: School name (English)
              - name: school_jp
                type: string
                label: School name (Japanese)
              - name: school_zh
                type: string
                label: School name (Traditional Chinese)
              - name: items_en
                type: list
                label: Programs (English)
                options:
                  item:
                    type: string
              - name: items_jp
                type: list
                label: Programs (Japanese)
                options:
                  item:
                    type: string
              - name: items_zh
                type: list
                label: Programs (Traditional Chinese)
                options:
                  item:
                    type: string
