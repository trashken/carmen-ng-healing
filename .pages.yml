# PagesCMS configuration for carmen-ng-healing.
# Docs: https://pagescms.org/docs/
#
# This file is read by app.pagescms.org against the connected GitHub repo.
# It declares what content editors can edit, where files live, and where
# uploaded media is stored.
#
# Status: config-only. The Astro site still reads from src/data/posts.ts
# and src/pages/testimonials.astro. Migrating those to content collections
# is the next step, but is gated on you confirming this config loads
# correctly in the PagesCMS UI.
components:
  t_string:
    type: object
    label: Translatable String
    fields:
      - { name: en, label: English, type: string }
      - { name: jp, label: 日本語, type: string }
      - { name: zh, label: 繁體中文, type: string }      
  t_text:
    type: object
    label: Translatable Text
    fields:
      - { name: en, label: English, type: text }
      - { name: jp, label: 日本語, type: text } 
      - { name: zh, label: 繁體中文, type: text }      
  links: 
    type: object
    label: Links
    fields:
      - name: title
        component: t_string
        label: Title
      - name: url
        type: string
        label: URL
        
media:
  - name: assets
    label: Asset Images
    input: public/assets
    output: /assets
    categories: [image]
    extensions: [jpg, jpeg, png, webp]
  - name: images
    label: Blog cover images
    input: public/uploads
    output: /uploads
    categories: [image]
    extensions: [jpg, jpeg, png, webp]  
  - name: videos
    label: Blog videos
    input: public/videos
    output: /videos
    categories: [video]

  # ---------------------------------------------------------------------------
  # Blog posts
  # ---------------------------------------------------------------------------
  # One Markdown file per post, in src/content/blog/{slug}.md.
  # Frontmatter holds metadata + 3 body fields (one per locale).
  # The Markdown body is left empty; PagesCMS edits the body fields directly.
  # ---------------------------------------------------------------------------

content:
  - name: blog
    label: Blog Posts
    path: src/content/blog
    filename: '{slug}.md'
    format: yaml-frontmatter
    type: collection
    view:
      fields: [title.en, title.jp, title.zh, published, date]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: slug
        type: string
        label: URL slug
        description: >-
          Lowercase, hyphen-separated. Used as the filename and the post URL
          (e.g. "ghibli-paper-fortune" → /en/blog/ghibli-paper-fortune).
        options:
          maxlength: 80
        # Slug is also the filename; do not let editors rename freely.
        # (The PagesCMS filename template uses {slug} so they must match.)
      - name: title
        component: t_string        
      - name: date
        type: date
        label: Publish date
      - name: category
        type: select
        # label: Category
        options:
          values: 
          - name: article
            label: Article
          - name: news
            label: News & Events
      - name: cover
        type: image
        label: Cover image
        description: Square 1000×1000 image. Stored in public/uploads/.
        options:
          media: images
          path: public/uploads
          extensions: [jpg, jpeg, png, webp]
      - name: video
        label: Cover Video
        type: file
        options:
          media: videos
          path: public/videos
          categories: [video]          
        description: >-
          Leave blank if the post uses a still cover image.      
      - name: body_en
        type: rich-text
        label: Body (English)
        description: >-
          Markdown body. Leave blank if the English translation is not
          ready; the site will fall back to the Japanese body and show a
          "translation pending" notice.
        options:
          format: markdown
          switcher: true
      - name: body_jp
        type: rich-text
        label: Body (Japanese)
        description: >-
          Markdown body. Required. JP is the canonical version — EN and
          ZH fall back to this when empty.
        options:
          format: markdown
          switcher: true
      - name: body_zh
        type: rich-text
        label: Body (Traditional Chinese)
        description: >-
          Markdown body. Leave blank to fall back to the Japanese body
          with a "中文翻譯準備中" notice.
        options:
          format: markdown
          switcher: true

  # ---------------------------------------------------------------------------
  # Testimonials
  # ---------------------------------------------------------------------------
  # One Markdown file per testimonial, in src/content/testimonials/{name}.md.
  # Filename is the testimonial author's first name (used as a unique id).
  # ---------------------------------------------------------------------------
  
  - name: testimonials
    label: Testimonials
    type: collection
    path: src/content/testimonials
    filename: '{title}.md'
    format: yaml-frontmatter
    view:
      fields: [ title, service, updated]
      primary: name
      sort: [ updated ]      
      default:
        sort: date
        order: desc    
    fields:     
      - name: id
        type: uuid
        options:
          editable: false              
      - name: title
        type: string
        label: Title 
      - name: service
        type: string
        label: Session / Workshop
        description: >-
          Which session or workshop the testimonial is for (e.g. "Spiritual
          Guidance & Healing", "Body Scan Workshop", "Home Cleansing R.A.A.H.").
      - name: created
        type: date
        label: Created Date    
        options:          
          format: yyyy-MM-dd
      - name: updated
        type: date
        label: Modified Date
        options:          
          format: yyyy-MM-dd
      - name: lang
        type: select
        label: Original language
        options:
          values:
          - name: jp
            label: 日本語 (Japanese)
          - name: en
            label: English
          - name: zh
            label: 中文 (Traditional Chinese)      
      - name: body
        type: rich-text
        label: Testimonial text

  # ---------------------------------------------------------------------------
  # Q & A
  # ---------------------------------------------------------------------------
  # One Markdown file per FAQ, in src/content/faqs/{slug}.md.
  # Each FAQ has per-locale question + answer. EN is required; JP and
  # ZH fall back to EN on the page when empty. Display order is
  # controlled by the `order` field (lower numbers appear first).
  # Shown on the homepage in the "Q & A" section under Contact.
  # ---------------------------------------------------------------------------

  - name: faqs
    label: Q & A
    type: collection
    path: src/content/faqs
    filename: '{slug}.md'
    format: yaml-frontmatter
    view:
      fields: [order, question.en, date]
      primary: question.en
      sort: [order]
      default:
        sort: order
        order: asc
    fields:
      - name: order
        type: number
        label: Display order
        description: >-
          Lower numbers appear first. Leave at 100 to push to the end.
        options:
          min: 1
          max: 999
          default: 1
      - name: question
        type: object
        label: Question
        description: >-
          Per-locale question. EN is required (canonical); JP and ZH
          are optional and fall back to EN on the page when empty.
        fields:
          - name: en
            type: string
            label: Question (English)
          - name: jp
            type: string
            label: Question (Japanese)
          - name: zh
            type: string
            label: Question (Traditional Chinese)
      - name: answer
        type: object
        label: Answer
        description: >-
          Per-locale answer (Markdown). Same fallback rules.
        fields:
          - name: en
            type: text
            label: Answer (English)
          - name: jp
            type: text
            label: Answer (Japanese)
          - name: zh
            type: text
            label: Answer (Traditional Chinese)

  # ---------------------------------------------------------------------------
  # Events / Workshops
  # ---------------------------------------------------------------------------
  # One Markdown file per event, in src/content/events/{slug}.md.
  # Each event has a single date, optional end date, optional location,
  # and per-locale title / summary / body. Shown on the Blog page's
  # "Events & Workshops" tab. Past events are still listed but visually
  # de-emphasized (lower opacity + "Past" label) and the registration
  # link is hidden.
  # ---------------------------------------------------------------------------

  - name: hero
    label: Hero (Homepage)
    type: collection
    path: src/content/hero
    filename: 'main.md'
    format: yaml-frontmatter
    view:
      primary: title
    fields:
      - name: title
        type: object
        label: Headline
        description: >-
          Per-locale headline shown in large display type on the homepage.
          EN is required; JP and ZH fall back to EN when empty.
        fields:
          - name: en
            type: string
            label: Headline (English)
          - name: jp
            type: string
            label: Headline (Japanese)
          - name: zh
            type: string
            label: Headline (Traditional Chinese)
      - name: title_kana
        type: string
        label: Kana / phonetic line
        description: >-
          Optional secondary line below the headline (e.g. "カーメン").
          Leave empty to hide.
      - name: welcome
        type: string
        label: Welcome line
        description: >-
          Optional small line above the headline (e.g. "Welcome").
          Leave empty to hide.
      - name: tagline
        type: string
        label: Tagline
        description: >-
          Small uppercase accent line (e.g. "Holistic Healing").
          Leave empty to hide.
      - name: description
        type: text
        label: Description
        description: >-
          Short hero paragraph (1-2 sentences) under the headline.
          Falls back to the i18n default if empty.
      - name: cta_primary
        type: string
        label: Primary CTA label
        description: >-
          Text for the coral "Book a Session" button.
          Falls back to the i18n default if empty.
      - name: cta_secondary
        type: string
        label: Secondary CTA label
        description: >-
          Text for the "Explore Services" outline button.
          Falls back to the i18n default if empty.

  - name: events
    label: Events & Workshops
    type: collection
    path: src/content/events
    filename: '{slug}.md'
    format: yaml-frontmatter
    view:
      fields: [date, title.en, title.jp, location]
      primary: title
      sort: [ date ]
      default:
        sort: date
        order: asc
    fields:
      - name: slug
        type: string
        label: URL slug
        description: >-
          Lowercase, hyphen-separated. Used as the filename (e.g.
          "sound-bath-january-2026" → /src/content/events/sound-bath-january-2026.md).
        options:
          maxlength: 80
      - name: title
        type: object
        label: Event title
        description: >-
          Per-locale title. JP and EN are required; ZH is optional and
          falls back to JP when empty.
        fields:
          - name: en
            type: string
            label: Title (English)
          - name: jp
            type: string
            label: Title (Japanese)
          - name: zh
            type: string
            label: Title (Traditional Chinese)
      - name: date
        type: date
        label: Event Date
        description: >-
          The start date/time of the event. The Events tab lists events
          in chronological order; past events are shown after upcoming
          ones and visually de-emphasized.
        options:
          format: yyyy-MM-dd
      - name: endDate
        type: date
        label: End date (optional)
        description: >-
          For multi-day events. Leave empty for single-day events.
        options:
          format: yyyy-MM-dd
      - name: location
        type: string
        label: Location
        description: >-
          Free-form text shown on the event card (e.g. "Online via
          Zoom", "Hong Kong — Central").
      - name: summary_en
        type: text
        label: Short summary (English)
        description: >-
          1-2 sentence summary shown on the Events tab card. Optional;
          if empty, the first paragraph of the body is used.
      - name: summary_jp
        type: text
        label: Short summary (Japanese)
      - name: summary_zh
        type: text
        label: Short summary (Traditional Chinese)
      - name: body_en
        type: rich-text
        label: Long description (English)
        options:
          format: markdown
      - name: body_jp
        type: rich-text
        label: Long description (Japanese)
        options:
          format: markdown
      - name: body_zh
        type: rich-text
        label: Long description (Traditional Chinese)
        options:
          format: markdown
      - name: cover
        type: image
        label: Cover image
        description: Square 1000×1000 image. Stored in public/uploads/.
        options:
          media: images
          path: public/uploads
          extensions: [jpg, jpeg, png, webp]
      - name: registrationUrl
        type: string
        label: Registration URL
        description: >-
          External link (e.g. Eventbrite). Shown as a "Register" button
          on upcoming events; hidden once the event date has passed.
      # Note: events render at /en/events, /jp/events, /zh/events (a single
      # page per locale, with all events in a vertical accordion). Editors
      # do not maintain per-event pages via PagesCMS.

  # ---------------------------------------------------------------------------
  # Services
  # ---------------------------------------------------------------------------
  # One Markdown file per service, in src/content/services/{slug}.md.
  # Each service has title/description in EN + JP + ZH (the EN homepage
  # shows title_en/desc_en; the JP/ZH homepages show title_jp/desc_jp or
  # title_zh/desc_zh). Display order is controlled by the 'order' field
  # (lower numbers appear first).
  # ---------------------------------------------------------------------------
  - name: services
    label: Services
    type: collection
    path: src/content/services
    filename: '{slug}.md'
    format: yaml-frontmatter
    view:
      fields: [title.en, title.zh, title.jp ]
      primary: title.en
      sort: [ title.en]      
    fields:
      - name: title
        type: object
        label: Title
        fields:
          - name: en
            type: string
            label: Title (English)
          - name: jp
            type: string
            label: Title (Japanese)
          - name: zh
            type: string
            label: Title (Traditional Chinese)
      - name: desc
        type: object
        label: Description
        fields:
          - name: en
            type: text
            label: Description (English)
          - name: jp
            type: text
            label: Description (Japanese)
          - name: zh
            type: text
            label: Description (Traditional Chinese)
      - name: icon
        type: string
        label: Icon
        description: >-
          A single emoji or symbol character shown in the card (e.g. ✦, ♯,
          ☆, ◈). Rendered as text, so it must be a real Unicode character.
      - name: image
        type: image
        label: Service image
        description: >-
          Public path to a watercolor illustration under /uploads/
          (e.g. /uploads/energy-healing-hands.jpg). When set, the image
          replaces the icon glyph on the homepage + services-index
          cards. Leave empty to fall back to the icon.
        options:
          media: images
          path: public/assets
          extensions: [jpg, jpeg, png, webp]
      - name: color
        type: select
        label: Accent color
        description: >-
          Picks the soft accent color for the card. Limited to the site's
          existing palette to keep colors consistent.
        options:
          values:
          - name: rose
            label: Rose
          - name: lavender
            label: Lavender
          - name: sky
            label: Sky
          - name: peach
            label: Peach

      - name: order
        type: number
        label: Display order
        description: >-
          Lower numbers appear first. Leave at 100 to push to the end.
        options:
          min: 1
          max: 999
          default: 100

      # --- Detail page content (used by /[locale]/services/[slug] pages) ---
      # Tagline shown on the service detail page directly below the H1.
      - name: tagline
        type: object
        label: Tagline
        description: >-
          Short line shown below the service title on the detail page.
        fields:
          - name: en
            type: text
            label: Tagline (English)
          - name: jp
            type: text
            label: Tagline (Japanese)
          - name: zh
            type: text
            label: Tagline (Traditional Chinese)

      # Overview / intro paragraph at the top of the detail page.
      - name: intro
        type: object
        label: Overview
        fields:
          - name: en
            type: text
            label: Overview (English)
          - name: jp
            type: text
            label: Overview (Japanese)
          - name: zh
            type: text
            label: Overview (Traditional Chinese)

      # Long-form service body. Replaces the previous three separate
      # fields (What we do / Through the session / Recommended for).
      # Carmen writes her own Markdown — section headings (## / ###),
      # paragraphs, **bold**, *italic*, and - bullet lists are all
      # supported. JP/ZH fall back to EN on the detail page if empty.
      - name: serviceBody
        type: object
        label: 'Service body'
        description: >-
          Long-form body shown on the detail page below the Overview.
          Markdown is supported (## headings, **bold**, *italic*, - lists,
          paragraphs). Write the section structure you want.
        fields:
          - name: en
            type: rich-text
            label: 'Body (English)'
          - name: jp
            type: rich-text
            label: 'Body (Japanese)'
          - name: zh
            type: rich-text
            label: 'Body (Traditional Chinese)'
      - name: testimonial_1
        type: text
        label: 1st Testimonial
      - name: testimonial_2
        type: text
        label: 2nd Testimonial
      - name: testimonial_3
        type: text
        label: 3rd Testimonial

      # Sub-offerings: each becomes its own card on the detail page with
      # its own price + duration. Leave empty to keep this entry as a
      # homepage card only (no detail page).
      - name: offerings
        type: object
        list:
          collapsible: true
        label: Session offerings & pricing
        description: >-
          Each entry becomes a card on the service detail page. Add the
          first one for the initial session, then follow-ups, packages, etc.
        fields:
          - name: title
            type: object
            label: Title
            fields:
              - name: en
                type: string
                label: Title (English)
              - name: jp
                type: string
                label: Title (Japanese)
              - name: zh
                type: string
                label: Title (Traditional Chinese)
          - name: desc
            type: object
            label: Description
            fields:
              - name: en
                type: text
                label: Description (English)
              - name: jp
                type: text
                label: Description (Japanese)
              - name: zh
                type: text
                label: Description (Traditional Chinese)
          - name: duration
            type: object
            label: Duration
            fields:
              - name: en
                type: string
                label: Duration (English, e.g. "120 min")
              - name: jp
                type: string
                label: Duration (Japanese, e.g. "120分")
              - name: zh
                type: string
                label: Duration (Traditional Chinese, e.g. "120分鐘")
          - name: price
            type: object
            label: Price
            fields:
              - name: en
                type: number
                label: Price (USD, English)
                description: >-
                  Integer. Set to 0 to show "Contact for pricing".
                options:
                  min: 0
              - name: jp
                type: number
                label: Price (JPY, Japanese)
                description: >-
                  Integer. Set to 0 to show "Contact for pricing".
                options:
                  min: 0
              - name: zh
                type: number
                label: Price (HKD, Traditional Chinese)
                description: >-
                  Integer. Set to 0 to show "Contact for pricing".
                options:
                  min: 0
          - name: currency
            type: object
            label: Currency prefix
            fields:
              - name: en
                type: string
                label: Currency prefix (English)
                description: >-
                  Text prefix shown before the EN price. Default "US$".
              - name: jp
                type: string
                label: Currency prefix (Japanese)
                description: >-
                  Text prefix shown before the JP price. Default "¥".
              - name: zh
                type: string
                label: Currency prefix (Traditional Chinese)
                description: >-
                  Text prefix shown before the ZH price. Default "HK$".
      - name: slug
        type: string
        label: URL slug
        description: >-
          Lowercase, hyphen-separated. Used as the filename and the
          service detail URL (e.g. "spiritual-guidance" →
          /en/services/spiritual-guidance).

  # ---------------------------------------------------------------------------
  # About Me
  # ---------------------------------------------------------------------------
  # Single-entry collection. There is only one About page; it's always
  # fetched with `getEntry('about', 'main')`. Body content is per-locale
  # (JP body is always required; EN and ZH optional, fall back to JP
  # on the page). The "main" filename is fixed — do not rename.
  # ---------------------------------------------------------------------------
  - name: about
    label: About Me
    type: collection
    path: src/content/about
    filename: 'main.md'
    format: yaml-frontmatter
    view:
      fields: [title_en, title_jp, title_zh]
      primary: title_en
    fields:
      - name: title_en
        type: string
        label: Page title (English)
      - name: title_jp
        type: string
        label: Page title (Japanese)
      - name: title_zh
        type: string
        label: Page title (Traditional Chinese)
      - name: body_en
        type: text
        label: Body (English)
        description: >-
          Long-form bio, paragraph breaks preserved. Falls back to
          the Japanese body on /en/about if empty.
      - name: body_jp
        type: text
        label: Body (Japanese)
      - name: body_zh
        type: text
        label: Body (Traditional Chinese)
      - name: signoff_en
        type: text
        label: Sign-off (English)
        description: >-
          Closing line, e.g. "Love Light,\nCarmen". Line breaks
          preserved.
      - name: signoff_jp
        type: text
        label: Sign-off (Japanese)
      - name: signoff_zh
        type: text
        label: Sign-off (Traditional Chinese)      
      - name: portrait
        type: image
        label: Portrait Image
        options:
          media: images
          path: public/uploads
          extensions: [jpg, jpeg, png, webp]
      - name: hands
        type: string
        label: Hands / second image path
        description: >-
          Public path under /uploads/. Shown in the right column of
          the about page hero.
      - name: languages_en
        type: text
        label: 'Languages note (English)'
        description: >-
          Optional footnote, e.g. "I work in English, Cantonese,
          and Japanese." Leave empty to hide.
      - name: languages_jp
        type: text
        label: 'Languages note (Japanese)'
      - name: languages_zh
        type: text
        label: 'Languages note (Traditional Chinese)'
      - name: certifications
        type: list
        label: Training & Certifications
        description: >-
          One entry per school. Each school has a per-locale name +
          a list of completed programs.
        options:
          item:
            type: object
            fields:
              - name: school_en
                type: string
                label: School name (English)
              - name: school_jp
                type: string
                label: School name (Japanese)
              - name: school_zh
                type: string
                label: School name (Traditional Chinese)
              - name: items_en
                type: list
                label: Programs (English)
                options:
                  item:
                    type: string
              - name: items_jp
                type: list
                label: Programs (Japanese)
                options:
                  item:
                    type: string
              - name: items_zh
                type: list
                label: Programs (Traditional Chinese)
                options:
                  item:
                    type: string
actions:
  - name: deploy-site
    label: Deploy site
    workflow: cms-deploy.yml
    ref: current
    fields:
      - name: force